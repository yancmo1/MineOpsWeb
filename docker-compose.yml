services:
  pocketbase:
    build: ./pocketbase
    restart: unless-stopped
    environment:
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:?set PB_ADMIN_EMAIL}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:?set PB_ADMIN_PASSWORD}
    volumes:
      - pocketbase_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
  web:
    build:
      context: ./frontend
      target: production
    restart: unless-stopped
    depends_on:
      pocketbase: { condition: service_healthy }
    ports: ["8080:80"]
volumes:
  pocketbase_data:
