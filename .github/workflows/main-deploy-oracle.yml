name: Build and Push (main → GHCR)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: mineopsweb-main-build
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/yancmo1/mineopsweb-web
  PB_IMAGE: ghcr.io/yancmo1/mineopsweb-pocketbase

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (all workspaces)
        run: |
          npm ci
          # Workaround for npm bug 4828: npm ci skips platform-specific
          # optional deps like @rollup/rollup-linux-x64-gnu
          npm install @rollup/rollup-linux-x64-gnu --no-save --ignore-scripts 2>/dev/null || true

      - name: Frontend tests + typecheck + build
        working-directory: ./frontend
        run: |
          npx vitest run
          npx tsc --noEmit
          npx vite build

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (web)
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Docker metadata (pocketbase)
        id: meta_pb
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push pocketbase image
        uses: docker/build-push-action@v6
        with:
          context: ./pocketbase
          file: ./pocketbase/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_pb.outputs.tags }}
          labels: ${{ steps.meta_pb.outputs.labels }}
          cache-from: type=gha,scope=pb
          cache-to: type=gha,mode=max,scope=pb
