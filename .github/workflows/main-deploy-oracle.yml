name: Build and Deploy (main -> Oracle)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: mineopsweb-main-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/yancmo1/mineopsweb-web
  PB_IMAGE: ghcr.io/yancmo1/mineopsweb-pocketbase

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend tests + typecheck + build
        run: |
          cd frontend
          npm ci --include=optional
          npx vitest run
          npx tsc --noEmit
          npx vite build

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (web)
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}

      - name: Docker metadata (pocketbase)
        id: meta_pb
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push pocketbase image
        uses: docker/build-push-action@v6
        with:
          context: ./pocketbase
          file: ./pocketbase/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_pb.outputs.tags }}
          labels: ${{ steps.meta_pb.outputs.labels }}

  deploy-oracle:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ORACLE_VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.ORACLE_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Push deployment files
        run: |
          APP_DIR="${{ secrets.ORACLE_APP_DIR }}"
          if [ -z "$APP_DIR" ]; then APP_DIR="/opt/infra-new/apps/mineopsweb"; fi
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.ORACLE_VM_USER }}@${{ secrets.ORACLE_VM_HOST }}" "mkdir -p ${APP_DIR}"
          scp -i ~/.ssh/id_ed25519 deploy/oracle/docker-compose.prod.yml "${{ secrets.ORACLE_VM_USER }}@${{ secrets.ORACLE_VM_HOST }}:${APP_DIR}/docker-compose.prod.yml"
          scp -i ~/.ssh/id_ed25519 scripts/deploy/oracle-deploy.sh "${{ secrets.ORACLE_VM_USER }}@${{ secrets.ORACLE_VM_HOST }}:${APP_DIR}/oracle-deploy.sh"

      - name: Write remote .env
        run: |
          APP_DIR="${{ secrets.ORACLE_APP_DIR }}"
          if [ -z "$APP_DIR" ]; then APP_DIR="/opt/infra-new/apps/mineopsweb"; fi
          printf '%s\n' "${{ secrets.MINEOPS_PROD_ENV }}" > /tmp/mineopsweb-prod.env
          scp -i ~/.ssh/id_ed25519 /tmp/mineopsweb-prod.env "${{ secrets.ORACLE_VM_USER }}@${{ secrets.ORACLE_VM_HOST }}:${APP_DIR}/.env"
          rm -f /tmp/mineopsweb-prod.env

      - name: Deploy on Oracle
        run: |
          APP_DIR="${{ secrets.ORACLE_APP_DIR }}"
          if [ -z "$APP_DIR" ]; then APP_DIR="/opt/infra-new/apps/mineopsweb"; fi
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.ORACLE_VM_USER }}@${{ secrets.ORACLE_VM_HOST }}" "set -euo pipefail
            echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' --password-stdin
            chmod +x ${APP_DIR}/oracle-deploy.sh
            APP_DIR=${APP_DIR} ${APP_DIR}/oracle-deploy.sh
          "
