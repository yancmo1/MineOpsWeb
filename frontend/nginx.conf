server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # index.html must NEVER be cached — fresh copy guarantees correct asset hashes
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Service worker: must always be revalidated for PWA update safety
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Manifest: keep fresh
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Static assets: content-hashed by Vite → cache forever, NEVER fall through to SPA
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Icons: content-hashed or versioned, safe to cache
  location /icons/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Catalog data: versioned, safe to cache
  location /catalog/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location /kolibri/ {
    proxy_pass https://capsule.kolibrigames.com/api/client/v1/;
    proxy_set_header Host capsule.kolibrigames.com;
    proxy_set_header Authorization $http_authorization;
    proxy_pass_header Authorization;
    proxy_ssl_server_name on;
    proxy_buffering off;
  }

  location /master/ {
    proxy_pass https://idle-miners.com/;
    proxy_set_header Host idle-miners.com;
    proxy_ssl_server_name on;
    proxy_buffering off;
  }

  # SPA fallback — only for non-file-looking paths (no extension)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
