services:
  pocketbase:
    build: ./pocketbase
    ports: ["8090:8090"]
    volumes: ["pocketbase_dev_data:/pb/pb_data"]
    environment:
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-}
  web:
    build:
      context: ./frontend
      target: development
    volumes: ["./frontend:/app", "frontend_node_modules:/app/node_modules"]
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports: ["8080:5173"]
    environment:
      VITE_POCKETBASE_URL: http://localhost:8090
      VITE_KOLIBRI_ID: ${VITE_KOLIBRI_ID:-}
      VITE_KOLIBRI_AUTH_TOKEN: ${VITE_KOLIBRI_AUTH_TOKEN:-}
      VITE_KOLIBRI_SAVE_GAME_KEY: ${VITE_KOLIBRI_SAVE_GAME_KEY:-0}
volumes:
  pocketbase_dev_data: {}
  frontend_node_modules: {}
