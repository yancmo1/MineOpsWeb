services:
  backend:
    build:
      context: ./backend
      target: development
    volumes:
      - ./backend/app:/app/app
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
  frontend:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports: !override
      - "8080:5173"
volumes:
  frontend_node_modules:
