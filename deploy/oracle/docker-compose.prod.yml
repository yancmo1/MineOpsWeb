services:
  pocketbase:
    image: ghcr.io/yancmo1/mineopsweb-pocketbase:${PB_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:?set PB_ADMIN_EMAIL}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:?set PB_ADMIN_PASSWORD}
    volumes:
      - pocketbase_data:/pb/pb_data
    ports:
      - "127.0.0.1:8090:8090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/yancmo1/mineopsweb-web:${WEB_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      pocketbase:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:80"

  # Watchtower auto-deploy: polls GHCR and restarts containers when new images appear
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --interval=60
      - --cleanup
      - --rolling-restart
      - mineopsweb-web-1
      - mineopsweb-pocketbase-1
    environment:
      - DOCKER_API_VERSION=1.53

volumes:
  pocketbase_data:
